<svg viewBox="0 0 980 460" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#6d8bff"/>
    </marker>
  </defs>

  <rect width="980" height="460" fill="#0b0e14"/>

  <!-- Title -->
  <text x="30" y="34" fill="#e7eaf1" font-size="18" font-weight="700">fairaudit — architecture</text>
  <text x="30" y="54" fill="#9aa2b5" font-size="12">Python engine is the single source of truth; the CLI and REST API both call the same code path.</text>

  <!-- Engine column -->
  <rect x="30" y="80" width="230" height="330" rx="12" fill="#131722" stroke="#232838"/>
  <text x="145" y="106" fill="#e7eaf1" font-size="13" font-weight="700" text-anchor="middle">Python engine</text>
  <text x="145" y="122" fill="#9aa2b5" font-size="10.5" text-anchor="middle">scikit-learn + Fairlearn</text>

  <rect x="50" y="140" width="190" height="46" rx="8" fill="#0f1420" stroke="#2a3040"/>
  <text x="145" y="159" fill="#e7eaf1" font-size="11.5" text-anchor="middle">Synthetic domain datasets</text>
  <text x="145" y="174" fill="#9aa2b5" font-size="10" text-anchor="middle">hiring · lending · content mod.</text>

  <line x1="145" y1="186" x2="145" y2="204" stroke="#6d8bff" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="50" y="206" width="190" height="42" rx="8" fill="#0f1420" stroke="#2a3040"/>
  <text x="145" y="231" fill="#e7eaf1" font-size="11.5" text-anchor="middle">scikit-learn model</text>

  <line x1="145" y1="248" x2="145" y2="266" stroke="#6d8bff" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="50" y="268" width="190" height="46" rx="8" fill="#0f1420" stroke="#2a3040"/>
  <text x="145" y="288" fill="#e7eaf1" font-size="11.5" text-anchor="middle">Fairlearn MetricFrame</text>
  <text x="145" y="303" fill="#9aa2b5" font-size="10" text-anchor="middle">DP · equalized odds · pred. parity</text>

  <line x1="145" y1="314" x2="145" y2="332" stroke="#6d8bff" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="50" y="334" width="190" height="60" rx="8" fill="#0f1420" stroke="#2a3040"/>
  <text x="145" y="354" fill="#e7eaf1" font-size="11.5" text-anchor="middle">severity.py + remediation.py</text>
  <text x="145" y="369" fill="#9aa2b5" font-size="10" text-anchor="middle">0-100 score, risk tier,</text>
  <text x="145" y="382" fill="#9aa2b5" font-size="10" text-anchor="middle">rule-based guidance</text>

  <!-- Arrow engine -> report -->
  <line x1="260" y1="245" x2="330" y2="245" stroke="#6d8bff" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- AuditReport JSON -->
  <rect x="335" y="195" width="180" height="100" rx="12" fill="#131722" stroke="#232838"/>
  <text x="425" y="220" fill="#e7eaf1" font-size="13" font-weight="700" text-anchor="middle">AuditReport JSON</text>
  <text x="425" y="240" fill="#9aa2b5" font-size="10" text-anchor="middle">report.py schema — the</text>
  <text x="425" y="254" fill="#9aa2b5" font-size="10" text-anchor="middle">single contract shared by</text>
  <text x="425" y="268" fill="#9aa2b5" font-size="10" text-anchor="middle">CLI, API, and dashboard</text>

  <!-- CLI branch -->
  <line x1="425" y1="195" x2="425" y2="150" stroke="#6d8bff" stroke-width="1.5"/>
  <line x1="425" y1="150" x2="345" y2="150" stroke="#6d8bff" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="200" y="126" width="145" height="48" rx="8" fill="#0f1420" stroke="#2a3040"/>
  <text x="272" y="146" fill="#e7eaf1" font-size="11.5" text-anchor="middle">fairaudit CLI</text>
  <text x="272" y="161" fill="#9aa2b5" font-size="10" text-anchor="middle">used in CI directly</text>

  <!-- API branch -->
  <line x1="425" y1="295" x2="425" y2="330" stroke="#6d8bff" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="330" y="332" width="190" height="60" rx="8" fill="#0f1420" stroke="#2a3040"/>
  <text x="425" y="356" fill="#e7eaf1" font-size="11.5" text-anchor="middle">Express REST API</text>
  <text x="425" y="371" fill="#9aa2b5" font-size="10" text-anchor="middle">/api/audits · /api/gate</text>
  <text x="425" y="384" fill="#9aa2b5" font-size="10" text-anchor="middle">spawns the CLI for live runs</text>

  <!-- API -> Dashboard -->
  <line x1="520" y1="362" x2="600" y2="362" stroke="#6d8bff" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="605" y="330" width="190" height="64" rx="8" fill="#0f1420" stroke="#2a3040"/>
  <text x="700" y="352" fill="#e7eaf1" font-size="11.5" text-anchor="middle">React dashboard</text>
  <text x="700" y="367" fill="#9aa2b5" font-size="10" text-anchor="middle">severity badges, per-group bars,</text>
  <text x="700" y="381" fill="#9aa2b5" font-size="10" text-anchor="middle">remediation guidance</text>

  <!-- API -> CI gate -->
  <line x1="520" y1="345" x2="600" y2="270" stroke="#6d8bff" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="605" y="245" width="190" height="56" rx="8" fill="#0f1420" stroke="#2a3040"/>
  <text x="700" y="267" fill="#e7eaf1" font-size="11.5" text-anchor="middle">CI / pre-deployment gate</text>
  <text x="700" y="282" fill="#9aa2b5" font-size="10" text-anchor="middle">POST /api/gate → pass / block</text>

  <!-- outer label boxes -->
  <rect x="605" y="80" width="330" height="330" rx="12" fill="none" stroke="#232838" stroke-dasharray="4 4"/>
  <text x="770" y="106" fill="#9aa2b5" font-size="11" text-anchor="middle">Consumers (Node.js + React)</text>
</svg>
